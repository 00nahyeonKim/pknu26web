<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>input응용</title>
  </head>
  <body>
    <h1>input 응용</h1>
    <hr />
    <a href="index.html">홈으로</a>

    <fieldset>
      <legend>로그인양식</legend>
      <form action="ex02-02a.html">
        <label for="input-id">아이디:</label>
        <input
          type="text"
          id="input-id"
          class="ban gym"
          placeholder="아이디를 입력하세요"
          title="아이디입력창"
          value="knh"
          required
        /><br />
        <label for="input-pw">비번:</label>
        <input
          type="password"
          id="input-pw"
          class="gym"
          placeholder="비밀번호를 입력하세요"
          required
        />
        <br />
        <input type="submit" />
        <input type="reset" />
      </form>
    </fieldset>
    <fieldset>
      <legend>그 외 양식</legend>
      <form action="#">
        <label for="in-date">날짜:</label>
        <input type="date" id="in-date" value="2026-03-16" />
        <label for="in-time">시간:</label>
        <input
          type="datetime-local"
          id=" all-time"
          value="12:31"
        /><br /><br /><br />
        <label
          for="upload"
          style="
            padding: 25px;
            background-color: antiquewhite;
            border-radius: 10px;
            font-size: 1.5rem;
          "
        ></label>
        <input type="file" id="upload" style="display: none" />
        <input type="submit" />
        <input type="reset" /><br /><br />
      </form>
    </fieldset>
  </body>
</html>
