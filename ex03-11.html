<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDN, 구글폰트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kirang+Haerang&family=Nanum+Pen+Script&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />

    <style>
      body {
        font-family: "Nanum Pen Script", "Kirang Haerang", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      .myfont2 {
        font-family: "Kirang Haerang", sans-serif;
        font-weight: 400;
        font-style: normal;
        background-color: aqua;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body>
    <h1>CDN, 구글폰트</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <h3 class="myfont2">엑스포 안내</h3>
    <p>반갑습니다.</p>
    <span>난 신경쓰지마.</span>
    <p>책자를 배부하고 있습니다.</p>
    <p>안내데스크를 활용하시길 바랍니다.</p>
    <!-- ul>(li>p)*2^^p{9월에는 가을 이벤트가 시작됩니다.} -->
    <ul>
      <li>
        <span>안내: 생략</span>
        <p>주중에는 정오 이벤트가 있습니다.</p>
      </li>
      <li>
        <span>주의사항: 내용이 없습니다.</span>
        <p>주말에는 자정 이벤트가 있습니다.</p>
      </li>
    </ul>
    <p>9월에는 가을 이벤트가 시작됩니다.</p>
    <h3>여기부터 아이콘</h3>
    <div class="material-symbols-outlined">wifi</div>
    <div class="material-symbols-outlined">charger</div>
    <div class="material-symbols-outlined">star</div>
    <div class="material-symbols-outlined">air</div>
    <div class="material-symbols-outlined">computer</div>
  </body>
</html>
