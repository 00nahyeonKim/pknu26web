<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f5f7fa;
        margin: 0;
        padding: 20px;
      }

      h1 {
        text-align: center;
      }

      a {
        display: inline-block;
        margin-bottom: 15px;
        text-decoration: none;
        color: #333;
      }

      .table-wrapper {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        text-align: center;
      }

      thead {
        background-color: #d2a679;
        color: white;
      }

      tbody tr:nth-child(even) {
        background-color: #f9f9f9;
      }

      tbody tr:hover {
        background-color: #ffe4c4;
        transition: 0.2s;
      }

      tfoot {
        background-color: #d2a679;
        color: white;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>📋 회원 명단</h1>
    <hr />
    <a href="index.html">🏠 홈으로</a>

      </table>
    </div>
  </body>
</html>
