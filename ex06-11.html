<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공탱탱</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: aqua;
        border-radius: 50%;
        animation: mymove 1s ease infinite alternate;
      }
      @keyframes mymove {
        0% {
          transform: translate(200px, 0);
        }
        100% {
          transform: translate(200px, 500px);
          width: 103px;
        }
      }
    </style>
  </head>
  <body>
    <h1>공탱탱</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div></div>
  </body>
</html>
