<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자리배치도</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #ddd;
      }

      .container {
        border: 3px solid #aab;
        padding: 30px;
        border-radius: 15px;
        background: #eee;
        text-align: center;
      }

      h1 {
        margin-bottom: 20px;
      }

      table {
        border-collapse: collapse;
        margin: auto;
        box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5);
      }

      td {
        width: 40px;
        height: 40px;
        text-align: center;
        border: 1px solid #ccc;
        background-color: antiquewhite;
      }

      tr:nth-of-type(even) td {
        background-color: aliceblue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>자리배치도</h1>
      <div id="result"></div>
    </div>

    <script>
      // 입력
      const head = Number(prompt("총 인원 몇명?", 30));
      const line = Number(prompt("한 줄에 몇명 앉을래?", 5));

      let list = "<table>";
      let count = 1;

      // 행 생성
      while (count <= head) {
        list += "<tr>";

        // 한 줄(열)
        for (let i = 0; i < line; i++) {
          if (count <= head) {
            list += `<td>${count}</td>`;
            count++;
          } else {
            list += `<td></td>`; // 빈칸
          }
        }

        list += "</tr>";
      }

      list += "</table>";

      // 출력
      document.getElementById("result").innerHTML = list;
    </script>
  </body>
</html>
