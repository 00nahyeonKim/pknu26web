<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      h2 {
        text-align: center;
      }
      #box {
        background-color: rgb(233, 197, 150);
        width: 400px;
        height: 300px;
        margin: 10% auto;
        padding: 40px 10px 40px 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        border-radius: 10px;
      }
      #box > div {
        height: 30px;
        margin: 5px;
        background-color: rgb(96, 98, 190);
        border-radius: 0 15px 15px 0;
      }
      table {
        width: 400px;
        margin: auto;
      }
      tr,
      th,
      td {
        background-color: rgb(29, 161, 106);
        color: white;
        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.5);
        padding: 10px;
        text-align: center;
        font-weight: bold;
      }
      span {
        position: absolute;
        color: white;
        font-weight: bold;
        display: block;
        text-align: right;
        line-height: 1.7rem;
      }
    </style>
  </head>
  <body>
    <input type="number" id="epochInput" value="100000" />
    <button id="btn">실행</button>
    <div id="result"></div>
    <script>
      document.getElementById("btn").addEventListener("click", function () {
        let list = "";
        let epoch = +document.getElementById("epochInput").value;
        if (!Number.isInteger(epoch) || epoch <= 0) {
          alert("1 이상의 정수를 입력하세요.");
          return;
        }
        let turn = 0;
        const arr = [0, 0, 0, 0, 0, 0];
        let verf = "검증중";

        while (turn < epoch) {
          const ran = Math.floor(Math.random() * 6);
          if (ran < 1) {
            arr[0]++;
          } else if (ran < 2) {
            arr[1]++;
          } else if (ran < 3) {
            arr[2]++;
          } else if (ran < 4) {
            arr[3]++;
          } else if (ran < 5) {
            arr[4]++;
          } else {
            arr[5]++;
          }
          turn++;
        }

        if (epoch == arr[0] + arr[1] + arr[2] + arr[3] + arr[4] + arr[5]) {
          verf = "검증완료";
        } else {
          verf = "검증이상";
          alert("검증이상");
        }

        const arr0 = ((arr[0] / epoch) * 100).toFixed(1);
        const arr1 = ((arr[1] / epoch) * 100).toFixed(1);
        const arr2 = ((arr[2] / epoch) * 100).toFixed(1);
        const arr3 = ((arr[3] / epoch) * 100).toFixed(1);
        const arr4 = ((arr[4] / epoch) * 100).toFixed(1);
        const arr5 = ((arr[5] / epoch) * 100).toFixed(1);

        list += `<h2>${epoch}회 (${verf})</h2><table>
            <tr>
              <th>눈</th>
              <th>이론적 확률</th>
              <th>횟수</th>
              <th>검증</th>
            </tr>
            <tr>
              <td>1</td>
              <td>16.67%</td>
              <td>${arr[0]}</td>
              <td>${arr0}%</td>
            </tr>
            <tr>
              <td>2</td>
              <td>16.67%</td>
              <td>${arr[1]}</td>
              <td>${arr1}%</td>
            </tr>
            <tr>
              <td>3</td>
              <td>16.67%</td>
              <td>${arr[2]}</td>
              <td>${arr2}%</td>
            </tr>
            <tr>
              <td>4</td>
              <td>16.67%</td>
              <td>${arr[3]}</td>
              <td>${arr3}%</td>
            </tr>
            <tr>
              <td>5</td>
              <td>16.67%</td>
              <td>${arr[4]}</td>
              <td>${arr4}%</td>
            </tr>
            <tr>
              <td>6</td>
              <td>16.67%</td>
              <td>${arr[5]}</td>
              <td>${arr5}%</td>
            </tr>
          </table>
          <div id="box">
              <div style="width: ${arr0}%"><span>1 (${arr0}%)</span></div>
              <div style="width: ${arr1}%"><span>2 (${arr1}%)</span></div>
              <div style="width: ${arr2}%"><span>3 (${arr2}%)</span></div>
              <div style="width: ${arr3}%"><span>4 (${arr3}%)</span></div>
              <div style="width: ${arr4}%"><span>5 (${arr4}%)</span></div>
              <div style="width: ${arr5}%"><span>6 (${arr5}%)</span></div>
            </div>`;
        document.getElementById("result").innerHTML = list;
      });
    </script>
    <button onclick="location.reload(true)">새로고침</button>
  </body>
</html>
