<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수선언식으로 게임</title>
  </head>
  <body>
    영웅의 이름을 입력하세요 <input type="text" id="name" /> <br />
    영웅의 레벨을 입력하세요 <input type="text" id="level" /> <br />
    영웅의 스킬을 입력하세요 <input type="text" id="skill" placeholder="fire / ice / slow" /><br />
    <button
      onclick="
        lol(
          document.getElementById('name').value,
          document.getElementById('level').value,
          document.getElementById('skill').value,
        )
      "
    >
      실행
    </button>
    <hr />
    <script>
      const lol = function(heroName, level = 1, cb) {

        if (cb === "fire") cb = fire;
        else if (cb === "ice") cb = ice;
        else if (cb === "slow") cb = slow;
        
        document.write("==========================<br>");
        document.write(`${heroName}님이 ${level}레벨이 되었습니다.<br>`);
        document.write("==========================<br>");

        if (level >= 6) {
          document.write(`${heroName}님이 궁극기를 씁니다.<br>`);
          cb(level);
        } else {
          document.write(`${heroName}님이 깨작 평타를 때립니다.<br>`);
        }
      }

      function fire(ff) {
        for (let i = 1; i <= ff; i++) {
          document.write(`${ff}레벨 이어서 ${i}개 메테오를 던집니다.<br>`);
        }
      }

      function ice(ii) {
        for (let i = 1; i <= ii; i++) {
          document.write(`${ii}레벨 이어서 ${i * 2}개 얼음을 던집니다.<br>`);
        }
      }

      function slow(ss) {
        for (let i = ss; 1 <= i; i--) {
          document.write(
            `${ss}레벨 이어서 다리를 공격하여 이동속도를 ${i}% 줄입니다.<br>`,
          );
        }
      }
    </script>
  </body>
</html>
